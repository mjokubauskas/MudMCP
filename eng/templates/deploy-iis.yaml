# IIS Deployment Template for MudBlazor MCP Server
# Reusable template for deploying to IIS on Windows VMs

parameters:
  - name: artifactName
    type: string
    displayName: 'Artifact name to deploy'
  - name: websiteName
    type: string
    displayName: 'IIS Website name'
  - name: appPoolName
    type: string
    displayName: 'IIS Application Pool name'
  - name: physicalPath
    type: string
    displayName: 'Physical path on the server'
  - name: environment
    type: string
    displayName: 'ASP.NET Core environment'
    default: 'Production'
  - name: port
    type: string
    displayName: 'Port for the website binding'
    default: '8000'
  - name: bindingProtocol
    type: string
    displayName: 'IIS binding protocol (auto, http, or https)'
    default: 'auto'
  - name: sslCertificateThumbprint
    type: string
    displayName: 'HTTPS certificate thumbprint (enables HTTPS in auto mode)'
    default: ''
  - name: mudBlazorVersion
    type: string
    displayName: 'MudBlazor version to serve documentation for'
    default: ''
  - name: healthMaxRetries
    type: string
    displayName: 'Maximum health check retries'
    default: '6'
  - name: healthScheme
    type: string
    displayName: 'Health check URI scheme override'
    default: '$(iisEffectiveBindingProtocol)'
  - name: healthHostName
    type: string
    displayName: 'Health check host name'
    default: 'localhost'
  - name: healthRetryDelaySeconds
    type: string
    displayName: 'Health check retry delay in seconds'
    default: '10'
  - name: healthSkipCertValidation
    type: string
    displayName: 'Skip HTTPS certificate validation for loopback health checks'
    default: '$false'
    values:
      - '$false'
      - '$true'

steps:
  # Checkout source to get deployment scripts
  # Deployment jobs don't automatically have source code - only artifacts are downloaded
  - checkout: self
    displayName: 'Checkout deployment scripts'
    fetchDepth: 1

  - task: DownloadPipelineArtifact@2
    displayName: 'Download MudBlazor.Mcp build artifact'
    inputs:
      buildType: 'current'
      artifactName: '${{ parameters.artifactName }}'
      targetPath: '$(Pipeline.Workspace)/${{ parameters.artifactName }}'

  - task: PowerShell@2
    displayName: 'Stop IIS Website and Application Pool'
    inputs:
      targetType: 'filePath'
      filePath: '$(Build.SourcesDirectory)/eng/scripts/Stop-IisSiteAndAppPool.ps1'
      arguments: '-AppPoolName "${{ parameters.appPoolName }}" -WebsiteName "${{ parameters.websiteName }}"'
      errorActionPreference: 'continue'

  - task: PowerShell@2
    displayName: 'Backup current deployment'
    inputs:
      targetType: 'filePath'
      filePath: '$(Build.SourcesDirectory)/eng/scripts/Backup-Deployment.ps1'
      arguments: '-PhysicalPath "${{ parameters.physicalPath }}" -MaxBackups 3'
      errorActionPreference: 'continue'

  - task: PowerShell@2
    displayName: 'Deploy application files'
    inputs:
      targetType: 'filePath'
      filePath: '$(Build.SourcesDirectory)/eng/scripts/Deploy-IisContent.ps1'
      arguments: '-ArtifactPath "$(Pipeline.Workspace)/${{ parameters.artifactName }}" -PhysicalPath "${{ parameters.physicalPath }}"'

  - task: PowerShell@2
    displayName: 'Configure IIS Website and Application Pool'
    inputs:
      targetType: 'filePath'
      filePath: '$(Build.SourcesDirectory)/eng/scripts/Configure-IisWebsite.ps1'
      arguments: '-WebsiteName "${{ parameters.websiteName }}" -AppPoolName "${{ parameters.appPoolName }}" -PhysicalPath "${{ parameters.physicalPath }}" -Port ${{ parameters.port }} -BindingProtocol "${{ parameters.bindingProtocol }}"'
    env:
      IIS_SSL_CERTIFICATE_THUMBPRINT: ${{ parameters.sslCertificateThumbprint }}

  - task: PowerShell@2
    displayName: 'Update environment settings'
    inputs:
      targetType: 'filePath'
      filePath: '$(Build.SourcesDirectory)/eng/scripts/Update-EnvironmentSettings.ps1'
      arguments: '-PhysicalPath "${{ parameters.physicalPath }}" -Environment "${{ parameters.environment }}" -MudBlazorVersion "${{ parameters.mudBlazorVersion }}"'

  - task: PowerShell@2
    displayName: 'Set folder permissions'
    inputs:
      targetType: 'filePath'
      filePath: '$(Build.SourcesDirectory)/eng/scripts/Set-IisFolderPermissions.ps1'
      arguments: '-PhysicalPath "${{ parameters.physicalPath }}" -AppPoolName "${{ parameters.appPoolName }}"'

  - task: PowerShell@2
    displayName: 'Start IIS Application Pool and Website'
    inputs:
      targetType: 'filePath'
      filePath: '$(Build.SourcesDirectory)/eng/scripts/Start-IisSiteAndAppPool.ps1'
      arguments: '-AppPoolName "${{ parameters.appPoolName }}" -WebsiteName "${{ parameters.websiteName }}"'

  - task: PowerShell@2
    displayName: 'Verify deployment health'
    inputs:
      targetType: 'filePath'
      filePath: '$(Build.SourcesDirectory)/eng/scripts/Test-DeploymentHealth.ps1'
      arguments: '-HostName "${{ parameters.healthHostName }}" -Port ${{ parameters.port }} -Scheme "${{ parameters.healthScheme }}" -AppPoolName "${{ parameters.appPoolName }}" -PhysicalPath "${{ parameters.physicalPath }}" -MaxRetries ${{ parameters.healthMaxRetries }} -RetryDelaySeconds ${{ parameters.healthRetryDelaySeconds }} -SkipCertificateValidation ${{ parameters.healthSkipCertValidation }}'
